# ============================================================
# MicroProfile Config — Default Values (Development)
#
# These values are the LOWEST priority (ordinal 100).
# They can be overridden by:
#   - System Properties (-Dapp.name=...) → ordinal 400
#   - Environment Variables (APP_NAME=...) → ordinal 300
#
# Property Name → Environment Variable:
#   app.name         → APP_NAME
#   app.version      → APP_VERSION
#   smtp.host        → SMTP_HOST
#   db.url           → DB_URL
#   feature.darkmode → FEATURE_DARKMODE
# ============================================================

# Application
app.name=Config Demo
app.version=1.0.0
app.environment=development
app.description=MicroProfile Config Beispiel fuer den Java Services Kurs

# SMTP (for NotificationService)
smtp.host=localhost
smtp.port=1025
smtp.from=noreply@cgsit.training

# Database (reference — not actually connected)
db.url=jdbc:h2:mem:training
db.user=sa
db.password=sa

# Feature Flags
feature.darkmode=false
feature.notifications=true
feature.max-items-per-page=25

# Comma-separated list
app.allowed-origins=http://localhost:4200,http://localhost:3000
